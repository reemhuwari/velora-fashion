<section class="auth-page">

  <div class="auth-image">
    <div class="overlay">
      <h1>Join Our Fashion World</h1>
      <p>
        Create your account and discover the latest trends,
        exclusive collections, and special offers.
      </p>
    </div>
  </div>

  <div class="auth-form">

    <div class="auth-card">

      <h1>{{ 'REGISTER_PAGE.TITLE' | translate }}</h1>

      <p>{{ 'REGISTER_PAGE.SUBTITLE' | translate }}</p>

      <input
        type="text"
        [placeholder]="'REGISTER_PAGE.FULL_NAME' | translate"
        [(ngModel)]="name"
      >

      <input
        type="email"
        [placeholder]="'REGISTER_PAGE.EMAIL' | translate"
        [(ngModel)]="email"
      >

      <input
        type="password"
        [placeholder]="'REGISTER_PAGE.PASSWORD' | translate"
        [(ngModel)]="password"
      >

      <button (click)="register()">
        {{ 'REGISTER_PAGE.CREATE_ACCOUNT' | translate }}
      </button>

      <span
        *ngIf="errorMessage"
        class="error"
      >
        {{ errorMessage }}
      </span>
<div class="auth-switch">
  <span>{{ 'AUTH.HAVE_ACCOUNT' | translate }}</span>

  <a routerLink="/login">
    {{ 'AUTH.LOGIN' | translate }}
  </a>
</div>
    </div>

  </div>

</section>
