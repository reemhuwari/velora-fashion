<section class="auth-page">

  <div class="auth-image">
    <div class="overlay">
      <h1>Style Meets Elegance</h1>
      <p>Discover the latest fashion trends and exclusive collections.</p>
    </div>
  </div>

  <div class="auth-form">

    <div class="auth-card">

      <h1>{{ 'LOGIN_PAGE.TITLE' | translate }}</h1>

      <p>{{ 'LOGIN_PAGE.SUBTITLE' | translate }}</p>

      <input
        type="email"
        [placeholder]="'LOGIN_PAGE.EMAIL' | translate"
        [(ngModel)]="email"
      >

      <input
        type="password"
        [placeholder]="'LOGIN_PAGE.PASSWORD' | translate"
        [(ngModel)]="password"
      >

      <button (click)="login()">
        {{ 'LOGIN_PAGE.LOGIN_BUTTON' | translate }}
      </button>

      <span
        *ngIf="errorMessage"
        class="error"
      >
        {{ errorMessage }}
      </span>
<div class="auth-switch">
  <span>{{ 'AUTH.NO_ACCOUNT' | translate }}</span>

  <a routerLink="/register">
    {{ 'AUTH.CREATE_ACCOUNT' | translate }}
  </a>
</div>
    </div>

  </div>

</section>
